name: Release

# Auto-cuts a patch release on every push to main that touches source code.
# Use the workflow_dispatch input to force a minor or major bump.
# The bot's own "chore(release):" commits AND any message containing
# "[skip release]" are ignored, so there's no infinite loop.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "cli/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    name: Should we release?
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%B)"
          author="$(git log -1 --pretty=%an)"
          echo "Last commit: $msg"
          echo "Author: $author"
          if [[ "$msg" == chore\(release\):* ]] || [[ "$msg" == *"[skip release]"* ]]; then
            echo "Skipping release: bot/release commit."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "release=true" >> "$GITHUB_OUTPUT"

  test:
    name: Tests (gate)
    needs: guard
    if: needs.guard.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - working-directory: cli
        run: |
          go vet ./...
          go test ./...

  bump:
    name: Bump version + tag
    needs: [guard, test]
    if: needs.guard.outputs.release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: bump
        env:
          BUMP_KIND: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          current=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "([^"]+)".*/\1/')
          IFS=. read -r major minor patch <<<"$current"
          case "$BUMP_KIND" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch|*) patch=$((patch+1)) ;;
          esac
          next="$major.$minor.$patch"
          echo "Bumping $current -> $next ($BUMP_KIND)"
          sed -i.bak -E "s/^version = \"[^\"]+\"/version = \"$next\"/" pyproject.toml
          sed -i.bak -E "s/__version__ = \"[^\"]+\"/__version__ = \"$next\"/" src/skills_mcp/__init__.py
          rm -f pyproject.toml.bak src/skills_mcp/__init__.py.bak
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/skills_mcp/__init__.py
          git commit -m "chore(release): v$next"
          git tag "v$next"
          git push origin "HEAD:${GITHUB_REF_NAME}" "v$next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-wheel:
    name: Build Python wheel
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-cli:
    name: Build skill-registry ${{ matrix.os }}/${{ matrix.arch }}
    needs: bump
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${{ needs.bump.outputs.version }}"
          out="skill-registry"
          if [ "$GOOS" = "windows" ]; then out="skill-registry.exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${out}" ./cmd/skill-registry
          archive="skill-registry_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${archive}.zip" "$out"
          else
            tar czf "${archive}.tar.gz" "$out"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            cli/dist/skill-registry_*.tar.gz
            cli/dist/skill-registry_*.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub release
    needs: [bump, build-wheel, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.bump.outputs.tag }}"
          notes=$(printf '%s\n' \
            "Automated release for \`$tag\`." \
            "" \
            "* Python wheel: published to https://pypi.org/project/skills-registry/${tag#v}/" \
            "* Go CLI binaries for darwin/amd64, darwin/arm64, linux/amd64, linux/arm64, windows/amd64 are attached." \
            "" \
            "\`skills-registry init\` downloads the right CLI binary from the *latest* release; this is it.")
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber
          else
            gh release create "$tag" --title "$tag" --notes "$notes" artifacts/*
          fi

  pypi:
    name: Publish wheel to PyPI
    needs: [bump, build-wheel, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skills-registry
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
