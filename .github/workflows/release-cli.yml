name: Release skill-registry CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. cli-v0.3.0)"
        required: true

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: windows
            arch: amd64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#cli-}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="${{ github.event.inputs.tag }}"
            version="${version#cli-}"
          fi
          out="skill-registry"
          if [ "$GOOS" = "windows" ]; then out="skill-registry.exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${out}" ./cmd/skill-registry
          archive="skill-registry_${GOOS}_${GOARCH}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "${archive}.zip" "$out"
          else
            tar czf "${archive}.tar.gz" "$out"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: skill-registry_${{ matrix.os }}_${{ matrix.arch }}
          path: cli/dist/skill-registry_${{ matrix.os }}_${{ matrix.arch }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create / update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "skill-registry CLI release"
          fi
          gh release upload "$tag" dist/skill-registry_*.tar.gz dist/skill-registry_*.zip --clobber
